spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pmtracker
    username: pmtracker
    password: pmtracker
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  storage:
    base-path: ./storage
  frontend:
    base-url: http://localhost:5173
