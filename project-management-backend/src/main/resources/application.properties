spring.application.name=project-management-backend
spring.profiles.active=dev

# Spring не умеет ограничивать multipart per-endpoint, поэтому глобальный лимит взят по
# наибольшему потребителю — вложениям к задачам (Phase 7, 20MB, см. AttachmentService).
# Аватарка (Phase 2) ограничена более строгим лимитом (5MB) явной проверкой в UserService,
# а не глобальной настройкой — иначе она бы тоже расширилась до 20MB.
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB