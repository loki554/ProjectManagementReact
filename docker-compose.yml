services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pmtracker
      POSTGRES_USER: pmtracker
      POSTGRES_PASSWORD: pmtracker
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pg_data:
  